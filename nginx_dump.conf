# configuration file /etc/nginx/sites-enabled/aircraft-maintenance-platform:
server {
    if ($host = www.aircraft-maintenance-platform.eu.cc) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = aircraft-maintenance-platform.eu.cc) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80; listen [::]:80;
    server_name aircraft-maintenance-platform.eu.cc www.aircraft-maintenance-platform.eu.cc;
    return 301 https://$host$request_uri;




}
server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name aircraft-maintenance-platform.eu.cc www.aircraft-maintenance-platform.eu.cc;
    root /var/www/aircraft-maintenance-platform; index index.html;
    ssl_certificate /etc/letsencrypt/live/aircraft-maintenance-platform.eu.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aircraft-maintenance-platform.eu.cc/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(css|js|png|jpg|gif|ico|glb|woff|woff2)$ { expires 30d; access_log off; }
    location ~ /\.well-known { allow all; }
    gzip on;




}

# configuration file /etc/nginx/sites-enabled/openclaw-quant:
server {
    server_name stock.run.place;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/stock.run.place/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/stock.run.place/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = stock.run.place) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name stock.run.place;
    return 404; # managed by Certbot


}
# configuration file /etc/letsencrypt/options-ssl-nginx.conf:
# This file contains important security parameters. If you modify this file
# manually, Certbot will be unable to automatically provide future security
# updates. Instead, Certbot will print and log an error message with a path to
# the up-to-date file that you will need to refer to when manually updating
# this file.

ssl_session_cache shared:le_nginx_SSL:10m;
ssl_session_timeout 1440m;
ssl_session_tickets off;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

